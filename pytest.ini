[pytest]
# Pytest configuration for VoiceBot test suite

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    requires_ollama: marks tests that require Ollama server running
    requires_whisper: marks tests that require Whisper model downloaded
    security: marks security-focused tests
    unit: marks unit tests
    e2e: marks end-to-end tests

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Timeout for tests (in seconds) - set to prevent hanging
timeout = 300
